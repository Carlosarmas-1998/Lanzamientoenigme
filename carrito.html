<!DOCTYPE html>
<html lang="es-HN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Bolsa | La Casa ÈNIGME</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --marfil: #FAF9F6;
      --carbon: #121212;
      --gris-suave: #666666;
      --gris-claro: #F5F5F5;
      --gris-linea: #EAEAEA;
      --dorado: #CBAA63;
      --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--marfil);
      color: var(--carbon);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; transition: var(--transition); }
    button { background: none; border: none; font-family: inherit; cursor: pointer; outline: none; }

    /* NAVBAR MINIMALISTA */
    .navbar {
      width: 100%;
      padding: 30px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gris-linea);
      background: rgba(250, 249, 246, 0.98);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-nav {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.2rem, 2.5vw, 1.5rem);
      letter-spacing: 0.35em;
      color: var(--carbon);
      text-align: center;
    }

    .nav-group { display: flex; gap: 30px; align-items: center; flex: 1; }
    .nav-group.right { justify-content: flex-end; }
    .nav-group a {
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gris-suave);
      position: relative;
      padding-bottom: 4px;
    }
    .nav-group a:hover, .nav-group a.active { color: var(--carbon); }

    /* HEADER DEL CARRITO */
    .page-header {
      text-align: center;
      padding: 60px 5vw 40px;
      border-bottom: 1px solid var(--gris-linea);
    }

    .page-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--carbon);
      margin-bottom: 10px;
    }

    .page-subtitle {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gris-suave);
    }

    /* CONTENEDOR DEL CARRITO */
    .cart-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 5vw;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 60px;
      width: 100%;
      flex-grow: 1;
    }

    /* LISTA DE PRODUCTOS */
    .cart-items { display: flex; flex-direction: column; gap: 30px; }

    .cart-item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 20px;
      align-items: center;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--gris-linea);
    }

    .item-img {
      width: 100px;
      height: 120px;
      object-fit: cover;
      background: var(--blanco-puro);
      border: 1px solid var(--gris-linea);
    }

    .item-details { display: flex; flex-direction: column; gap: 8px; }
    .item-ref { font-size: 0.55rem; letter-spacing: 2px; color: var(--gris-suave); }
    .item-name { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--carbon); text-transform: uppercase; }
    .item-price { font-size: 0.8rem; font-weight: 500; color: var(--carbon); }

    /* CONTROLES DE CANTIDAD Y ELIMINAR */
    .item-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 15px;
    }

    .qty-control {
      display: flex;
      align-items: center;
      border: 1px solid var(--gris-linea);
    }

    .qty-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: var(--gris-suave);
    }
    .qty-btn:hover { color: var(--carbon); background: var(--gris-claro); }
    .qty-display { width: 40px; text-align: center; font-size: 0.8rem; font-weight: 500; }

    .btn-remove {
      font-size: 0.55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b30000;
      border-bottom: 1px solid transparent;
    }
    .btn-remove:hover { border-color: #b30000; }

    /* RESUMEN DEL PEDIDO (DERECHA) */
    .order-summary {
      background: var(--blanco-puro);
      padding: 40px 30px;
      border: 1px solid var(--gris-linea);
      height: fit-content;
      position: sticky;
      top: 120px;
    }

    .summary-title {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--gris-linea);
      padding-bottom: 15px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 0.8rem;
      color: var(--gris-suave);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--carbon);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--carbon);
    }

    /* BOTÓN WHATSAPP VIP */
    .btn-checkout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 30px;
      padding: 18px 0;
      background-color: var(--dorado);
      color: var(--carbon);
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
      transition: var(--transition);
      border: 1px solid var(--dorado);
    }

    .btn-checkout:hover {
      background-color: var(--carbon);
      color: var(--dorado);
      border-color: var(--carbon);
    }
    .btn-checkout svg { width: 16px; height: 16px; fill: currentColor; }

    /* SECCIÓN MIS SOLICITUDES (HISTORIAL) */
    .history-section {
      max-width: 1200px;
      margin: 0 auto 80px;
      padding: 0 5vw;
      width: 100%;
    }

    .history-title {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--carbon);
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .history-title::before { content: ''; width: 40px; height: 1px; background: var(--dorado); }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .history-card {
      border: 1px solid var(--gris-linea);
      padding: 25px;
      background: var(--blanco-puro);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed var(--gris-linea);
      padding-bottom: 15px;
      margin-bottom: 15px;
    }

    .history-date { font-size: 0.7rem; color: var(--gris-suave); letter-spacing: 2px; }
    .history-status { font-size: 0.6rem; color: var(--dorado); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
    
    .history-item-row {
      font-size: 0.8rem;
      color: var(--carbon);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .empty-msg {
      font-size: 0.8rem;
      color: var(--gris-suave);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      padding: 40px;
    }

    /* FOOTER */
    .footer {
      padding: 50px 5vw;
      text-align: center;
      border-top: 1px solid var(--gris-linea);
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--gris-suave);
      text-transform: uppercase;
      background: #FFF;
    }

    @media (max-width: 900px) {
      .cart-container { grid-template-columns: 1fr; gap: 40px; padding: 40px 5vw; }
      .order-summary { position: static; }
    }
    @media (max-width: 768px) {
      .navbar { flex-wrap: wrap; justify-content: center; gap: 20px; padding: 25px; }
      .nav-group { justify-content: center; flex-wrap: wrap; width: 100%; flex: none; gap: 15px;}
      .brand-nav { order: -1; width: 100%; margin-bottom: 10px; }
      .cart-item { grid-template-columns: 80px 1fr; }
      .item-actions { grid-column: span 2; flex-direction: row; justify-content: space-between; align-items: center; margin-top: 10px;}
      .item-img { height: 100px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-group">
      <a href="index.html">INICIO</a>
      <a href="certificado.html">CERTIFICADO</a>
    </div>
    <div class="brand-nav">È N I G M E</div>
    <div class="nav-group right">
      <a href="index.html#contacto">SOPORTE</a>
      <a href="carrito.html" class="active">CARRITO (<span id="cart-count">0</span>)</a>
    </div>
  </nav>

  <header class="page-header">
    <h1 class="page-title">Mi Bolsa</h1>
    <p class="page-subtitle">Selección Exclusiva</p>
  </header>

  <main class="cart-container">
    
    <div class="cart-items" id="cart-items-container">
      </div>

    <div class="order-summary">
      <h2 class="summary-title">Resumen V.I.P</h2>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="summary-subtotal">L 0</span>
      </div>
      <div class="summary-row">
        <span>Envío (Zona Sur)</span>
        <span>Incluido</span>
      </div>
      <div class="summary-total">
        <span>Total</span>
        <span id="summary-total">L 0</span>
      </div>

      <button class="btn-checkout" id="btn-send-whatsapp" onclick="processOrder()">
        <svg viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157.1zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
        Enviar Solicitud a WhatsApp
      </button>
    </div>

  </main>

  <section class="history-section" id="history-section" style="display: none;">
    <h2 class="history-title">Mis Solicitudes</h2>
    <div class="history-list" id="history-list-container">
      </div>
  </section>

  <footer class="footer">
    © 2026 ÈNIGME HONDURAS · DIRECCIÓN: CARLOS ARMAS MARTÍNEZ
  </footer>

  <script>
    let cart = [];

    // 1. Normalizar y Cargar el Carrito
    function loadCart() {
      const rawCart = JSON.parse(localStorage.getItem('enigme_cart')) || [];
      
      // Agrupar items repetidos y sumar cantidades
      cart = [];
      rawCart.forEach(item => {
        let existing = cart.find(i => i.ref === item.ref);
        if(existing) {
          existing.qty = (existing.qty || 1) + (item.qty || 1);
        } else {
          item.qty = item.qty || 1;
          cart.push(item);
        }
      });
      // Guardar el carrito limpio
      localStorage.setItem('enigme_cart', JSON.stringify(cart));
      
      renderCart();
      renderHistory();
    }

    // 2. Pintar los productos en la pantalla
    function renderCart() {
      const container = document.getElementById('cart-items-container');
      const countEl = document.getElementById('cart-count');
      let total = 0;
      let totalItems = 0;

      container.innerHTML = '';

      if (cart.length === 0) {
        container.innerHTML = '<p class="empty-msg">Tu bolsa está vacía. Explora nuestras colecciones.</p>';
        document.getElementById('btn-send-whatsapp').style.display = 'none';
      } else {
        document.getElementById('btn-send-whatsapp').style.display = 'flex';
        cart.forEach((item, index) => {
          // Extraer solo los números del precio (Ej: "L 399" -> 399)
          let priceNum = parseInt(item.price.replace(/\D/g, ''));
          let subtotalItem = priceNum * item.qty;
          total += subtotalItem;
          totalItems += item.qty;

          container.innerHTML += `
            <div class="cart-item">
              <img src="${item.img}" alt="${item.name}" class="item-img" onerror="this.src='https://via.placeholder.com/100x120?text=ÈNIGME'">
              <div class="item-details">
                <span class="item-ref">${item.ref}</span>
                <h3 class="item-name">${item.name}</h3>
                <span class="item-price">L ${priceNum}</span>
              </div>
              <div class="item-actions">
                <div class="qty-control">
                  <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                  <span class="qty-display">${item.qty}</span>
                  <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                </div>
                <button class="btn-remove" onclick="removeItem(${index})">Eliminar</button>
              </div>
            </div>
          `;
        });
      }

      // Actualizar Resumen y Navbar
      document.getElementById('summary-subtotal').innerText = `L ${total}`;
      document.getElementById('summary-total').innerText = `L ${total}`;
      if(countEl) countEl.innerText = totalItems;
    }

    // 3. Actualizar Cantidad
    function updateQty(index, delta) {
      if (cart[index].qty + delta > 0) {
        cart[index].qty += delta;
        localStorage.setItem('enigme_cart', JSON.stringify(cart));
        renderCart();
      }
    }

    // 4. Eliminar Producto
    function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem('enigme_cart', JSON.stringify(cart));
      renderCart();
    }

    // 5. PROCESAR PEDIDO VIP (WHATSAPP + MOVER A HISTORIAL)
    function processOrder() {
      if(cart.length === 0) return;

      let totalGlobal = 0;
      
      // Construir mensaje súper profesional para WhatsApp
      let waText = "V.I.P. ÈNIGME - NUEVA SOLICITUD DE COMPRA%0A%0A";
      waText += "Hola, deseo procesar la siguiente orden de Alta Joyería:%0A%0A";

      cart.forEach(item => {
        let priceNum = parseInt(item.price.replace(/\D/g, ''));
        let subtotal = priceNum * item.qty;
        totalGlobal += subtotal;
        
        waText += `▫️ ${item.qty}x [${item.ref}] ${item.name} - L ${subtotal}%0A`;
      });

      waText += `%0A━━━━━━━━━━━━━━━━━%0A`;
      waText += `*TOTAL ESTIMADO: L ${totalGlobal}*%0A`;
      waText += `━━━━━━━━━━━━━━━━━%0A%0A`;
      waText += `Quedo a la espera de sus instrucciones para el pago y entrega.`;

      // 1. Guardar en el Historial ("Mis Solicitudes")
      let history = JSON.parse(localStorage.getItem('enigme_solicitudes')) || [];
      const fecha = new Date().toLocaleDateString('es-HN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit' });
      
      history.unshift({
        date: fecha,
        items: [...cart],
        total: totalGlobal,
        status: "Enviado a WhatsApp"
      });
      localStorage.setItem('enigme_solicitudes', JSON.stringify(history));

      // 2. Vaciar el Carrito Activo
      cart = [];
      localStorage.setItem('enigme_cart', JSON.stringify(cart));
      
      // 3. Actualizar Pantalla Visualmente
      renderCart();
      renderHistory();

      // 4. Abrir WhatsApp (Número de ÈNIGME)
      const phone = "34602149162";
      window.open(`https://wa.me/${phone}?text=${waText}`, '_blank');
    }

    // 6. Cargar y Pintar el Historial
    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('enigme_solicitudes')) || [];
      const historySection = document.getElementById('history-section');
      const historyContainer = document.getElementById('history-list-container');

      if (history.length > 0) {
        historySection.style.display = 'block';
        historyContainer.innerHTML = '';

        history.forEach((order, index) => {
          let itemsHtml = '';
          order.items.forEach(i => {
            let pNum = parseInt(i.price.replace(/\D/g, ''));
            itemsHtml += `<div class="history-item-row"><span>${i.qty}x ${i.name} (${i.ref})</span> <span>L ${pNum * i.qty}</span></div>`;
          });

          historyContainer.innerHTML += `
            <div class="history-card">
              <div class="history-header">
                <span class="history-date">${order.date}</span>
                <span class="history-status">${order.status}</span>
              </div>
              <div class="history-items">
                ${itemsHtml}
              </div>
              <div class="history-item-row" style="margin-top: 15px; border-top: 1px solid var(--gris-linea); padding-top: 10px; font-weight: 600;">
                <span>Total Orden</span>
                <span>L ${order.total}</span>
              </div>
            </div>
          `;
        });
      } else {
        historySection.style.display = 'none';
      }
    }

    // Arrancar la maquinaria al cargar la página
    window.onload = loadCart;
  </script>

</body>
</html>
